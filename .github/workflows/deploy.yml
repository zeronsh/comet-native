name: deploy

# Autodeploy the edge Worker + Durable Objects (session/device rooms, R2,
# WorkOS auth routes) on every push to main that touches edge/. Skips
# gracefully until the CLOUDFLARE_API_TOKEN secret is configured (until then:
# `npm -C edge run deploy` from a wrangler-authenticated machine).
#
# The token needs: Workers Scripts (edit), Workers Routes (edit) on zeron.sh,
# Workers R2 Storage (edit). Account id is pinned in edge/wrangler.jsonc.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  edge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # `github.event.before` may precede several commits in a batched push.
          fetch-depth: 0
      - name: detect edge changes
        id: changed
        shell: bash
        run: |
          before="${{ github.event.before }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] \
            || [ -z "$before" ] || ! git cat-file -e "$before" 2>/dev/null; then
            echo "changed=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if git diff --name-only "$before" "$GITHUB_SHA" | grep -qE "^edge/"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        if: steps.changed.outputs.changed == 'true'
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: edge/package-lock.json
      - name: install
        if: steps.changed.outputs.changed == 'true'
        working-directory: edge
        run: npm ci
      - name: typecheck
        if: steps.changed.outputs.changed == 'true'
        working-directory: edge
        run: npm run typecheck
      - name: test
        if: steps.changed.outputs.changed == 'true'
        working-directory: edge
        run: npm test
      - name: deploy
        if: steps.changed.outputs.changed == 'true' && secrets.CLOUDFLARE_API_TOKEN != ''
        working-directory: edge
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy
